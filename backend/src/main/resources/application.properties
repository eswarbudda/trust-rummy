# ==============================================================
# Trust Rummy - Backend Configuration
# ==============================================================

spring.application.name=trust-rummy-backend
server.port=8080

# ---------------------------------------------------------------
# PostgreSQL / JPA
# ---------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/trust_rummy?gssEncMode=disable&options=-c%20timezone=UTC
# PREVENTS JDBC FROM INJECTING LOCAL SYSTEM TIMEZONE PROPERTIES
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.username=postgres
spring.datasource.password=Password123!
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---------------------------------------------------------------
# Flyway - schema is now migration-managed (see db/migration); Hibernate
# only validates its entity mappings against it (ddl-auto=validate above).
# ---------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---------------------------------------------------------------
# JWT
# jwt.secret MUST be >= 32 chars (256 bits) for HMAC-SHA256.
# Production: set JWT_SECRET and leave jwt.allow-insecure-default=false.
# Local: allow-insecure-default=true permits the committed default secret.
# Access tokens are short-lived (15m); refresh tokens (30d) are hashed at rest,
# rotated on each /auth/refresh. Logout / password-change revoke refresh.
# ---------------------------------------------------------------
jwt.secret=${JWT_SECRET:change-this-dev-only-secret-key-min-32-chars!!}
jwt.allow-insecure-default=${JWT_ALLOW_INSECURE_DEFAULT:true}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

# Auth endpoint sliding-window rate limit (per key: IP / IP+username)
auth.rate-limit.max-attempts=${AUTH_RATE_LIMIT_MAX:20}
auth.rate-limit.window-ms=${AUTH_RATE_LIMIT_WINDOW_MS:300000}

# ---------------------------------------------------------------
# CORS - Rule 3: strict localhost/dev allow-list only.
# ---------------------------------------------------------------
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5000,http://localhost:8080,http://localhost:63342,http://localhost:63065

# ---------------------------------------------------------------
# Room / match lifecycle reaper (RoomLifecycleService)
# ---------------------------------------------------------------
rummy.lifecycle.sweep-interval-ms=60000
rummy.lifecycle.stale-waiting-room-minutes=10
rummy.lifecycle.disconnect-grace-seconds=90

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
logging.level.root=INFO
logging.level.com.trustrummy.backend=DEBUG
logging.level.org.springframework.web.socket=DEBUG

# ---------------------------------------------------------------
# Actuator (health check only, no sensitive exposure)
# ---------------------------------------------------------------
management.endpoints.web.exposure.include=health
